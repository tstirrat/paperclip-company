description: "Staff Engineer agent behavior — current vs baseline"

prompts:
  - id: file://../prompts/templates/staff-engineer-current.json
    label: staff-engineer-current
  - id: file://../prompts/templates/staff-engineer-baseline.json
    label: staff-engineer-baseline

providers:
  - id: openrouter:anthropic/claude-sonnet-4.6
    config:
      max_tokens: 600

defaultTest:
  options:
    provider: openrouter:anthropic/claude-sonnet-4.6

tests:
  - description: "No worktree — blocks task and returns to CEO"
    vars:
      scenario: |
        You've been assigned task AGE-48 "Implement OAuth2 PKCE flow". You run your
        startup checks:

          git rev-parse --show-toplevel
          → /home/user/agentsys

          git worktree list
          → /home/user/agentsys  abc123  [main]   (only one entry — no task worktree)

        What do you do?
    assert:
      - type: llm-rubric
        value: >
          The agent does NOT begin implementation. It marks the task blocked, reassigns
          it to the CEO, and posts a comment explaining that the task must be set up on
          a worktree branch before implementation can begin. It does not attempt to create
          the worktree itself.

  - description: "QA sends back fixes — re-applies full done criteria before re-handoff"
    vars:
      scenario: |
        QA & Release Lead has sent task AGE-48 back to you with the following comment:
        "Two issues found: (1) the PKCE verifier is not being stored server-side, it's
        leaking into the session cookie. (2) Missing test for the error case when
        code_challenge_method is unsupported."

        You fix both issues. What do you do before handing back off to QA?
    assert:
      - type: llm-rubric
        value: >
          The agent does not simply reassign to QA after fixing the two reported issues.
          It re-applies the full done criteria: runs type checks, linting, and tests;
          runs deslop to remove AI artifacts; runs validate-delivery to confirm no
          regressions; and only then reassigns to QA & Release Lead. It treats the
          done criteria as a checklist to re-run in full, not just the specific items
          QA called out.

  - description: "Plan has a gap — asks CTO to re-plan rather than improvising"
    vars:
      scenario: |
        You are implementing task AGE-52 "Add rate limiting to API endpoints". The CTO's
        plan says: "Step 4: Configure the rate limiter with appropriate limits per endpoint."
        But the plan gives no specifics — no numbers, no tiers, no guidance on which
        endpoints need stricter limits.

        What do you do?
    assert:
      - type: llm-rubric
        value: >
          The agent does NOT invent rate limit values or make architectural decisions about
          tiers and thresholds. It recognizes this as a gap in the plan that requires CTO
          judgment, and asks the CTO (via comment or reassignment) to clarify the specific
          limits before proceeding. It may describe exactly what information it needs, but
          it does not proceed with implementation by guessing.

  - description: "Blocked 2+ heartbeats — escalates to CTO with full context"
    vars:
      scenario: |
        You are implementing task AGE-53 "Integrate with Stripe webhooks". You are blocked
        waiting for the DevOps team to provision a Stripe test account. You posted a comment
        2 heartbeats ago explaining the blocker. No response yet. Your task is still
        status=blocked.

        What do you do this heartbeat?
    assert:
      - type: llm-rubric
        value: >
          The agent escalates rather than continuing to wait passively. It reassigns the
          task to the CTO with status blocked and includes full context: what it was working
          on, what external dependency is blocking it, how long it has been blocked, and
          what the CTO needs to do to unblock it (e.g. coordinate with DevOps or find an
          alternative path). It does not simply post another comment and exit without
          changing the assignee.
